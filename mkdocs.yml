site_name: "scryglass Documentation"
site_description: "Documentation for scryglass"
site_url: "https://efischer19.github.io/scryglass/"
docs_dir: docs-src

theme:
  name: material
  palette:
    primary: blue
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

plugins:
  - search

nav:
  - Home: index.md
  - Development:
      - Contributing: CONTRIBUTING.md
      - Development Philosophy: DEVELOPMENT_PHILOSOPHY.md
      - Feature Request Automation: feature-request-automation.md
  - Deployment:
      - AWS (S3 + CloudFront): deployment.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/efischer19/scryglass"
