name: Deploy to AWS (S3 + CloudFront)

# Deploys the built PWA to S3 and invalidates CloudFront.
# Runs automatically on push to main and can be triggered manually.
# See docs-src/deployment.md for setup instructions.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: aws-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to S3 and invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-DeployAWS-${{ github.run_id }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync site to S3
        run: |
          echo "🚀 Syncing site to s3://${{ vars.S3_BUCKET_NAME }}/"

          # Hashed assets under dist/assets/ — safe to cache aggressively
          aws s3 sync packages/pwa/dist/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "sw.js"

          # index.html and sw.js — short cache so updates propagate quickly
          aws s3 cp packages/pwa/dist/index.html \
            s3://${{ vars.S3_BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=60, s-maxage=300"

          aws s3 cp packages/pwa/dist/sw.js \
            s3://${{ vars.S3_BUCKET_NAME }}/sw.js \
            --cache-control "public, max-age=0, must-revalidate"

          echo "✅ Site synced successfully"

      - name: Invalidate CloudFront cache
        run: |
          echo "🔄 Creating CloudFront invalidation for distribution: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "✅ Invalidation created: $INVALIDATION_ID"

      - name: Smoke test
        if: vars.CLOUDFRONT_DOMAIN != ''
        run: |
          echo "🔍 Running smoke test against https://${{ vars.CLOUDFRONT_DOMAIN }}/"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ vars.CLOUDFRONT_DOMAIN }}/")

          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Smoke test passed (HTTP $STATUS)"
          else
            echo "❌ Smoke test failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## AWS Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :---- | :---- |" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket | \`s3://${{ vars.S3_BUCKET_NAME }}/\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Distribution | \`${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
